<!DOCTYPE html>
<html lang="en">
<head>
  <title>Calc</title>
  <script type="text/javascript">
  function compare(){
      var incid = 1e-5 * parseFloat(document.getElementById('incid').value);
      var sample = 1000;
      var cp = incid * sample;
      var cn = sample - cp;
      var sp = 0.01 * parseFloat(document.getElementById('spec').value);
      var se = 0.01 * parseFloat(document.getElementById('sens').value);
      var tp = se * cp;
      var fp = cn * (1.0 - sp);
      var tn = sp * cn;
      var fn = cp * (1.0 - se);
      document.getElementById("tp").innerHTML = Math.round(tp);
      document.getElementById("tn").innerHTML = Math.round(tn);
      document.getElementById("fp").innerHTML = Math.round(fp);
      document.getElementById("fn").innerHTML = Math.round(fn);
  }
</script>
</head>
<body>
  <div>
    <table>
      <tr>
        <td>RKI: Tagesaktuelle Inzidenz Deutschlandweit (/100000):</td>
        <td><input type="text" id="incid" value="125" /></td>
      </tr>
      <tr>
        <td>Eingabe Test Sensitivität (Prozent):</td>
        <td><input type="text" id="sens" value="95"/></td>
      </tr>
      <tr>
        <td>Eingabe Test Speziivität (Prozent):</td>
        <td><input type="text" id="spec" value="99"/></td>
      </tr>
    </table>
    <button onclick="compare()">Calculate</button>
  </div>
  <div>
    In 1000 getesteten Personen sind zu erwarten:
    <table>
      <tr>
        <td>Falsch positive (Anzahl):</td>
        <td id=fp></td>
      </tr>
      <tr>
        <td>Falsch negativ (Anzahl):</td>
        <td id=fn></td>
      </tr>
      <tr>
        <td>Richtig positive (Anzahl):</td>
        <td id=tp></td>
      </tr>
      <tr>
        <td>Richtig negativ (Anzahl):</td>
        <td id=tn></td>
      </tr>
    </table>
  </div>
</body>
</html>
