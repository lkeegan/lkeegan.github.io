<!DOCTYPE html>
<html lang="en">
<head>
  <title>Calc</title>
  <script type="text/javascript">
  function compare(){
      var sp = parseFloat(document.getElementById('spec').value);
      var se = parseFloat(document.getElementById('sens').value);
      if (sp > se) {
        alert("The first variable is greater than the second.");
      } else {
        alert("The second variable is greater than or equal to the first one.");
      }
  }
</script>
</head>
<body>
  <div>
    Specificity: <input type="text" id="spec" />
    Sensitivity: <input type="text" id="sens" />
    <button onclick="compare()">Compare</button>
  </div>
</body>
</html>
